<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI · KPI Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --border:#dddcd5;--border2:#c5c4bc;
  --text:#1a1a17;--muted:#686864;--hint:#a0a09a;
  --blue:#1559a0;--blue-bg:#e8f0fb;--blue-light:#c5d9f5;
  --green:#0c6b4e;--green-bg:#e0f4ed;
  --amber:#7a4a08;--amber-bg:#faebd6;
  --red:#9e2828;--red-bg:#fbeaea;
  --sidebar-w:260px;--topbar-h:46px;
  --radius:7px;--radius-lg:11px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
input,button,select,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LOGIN ── */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:32px;width:360px}
.lbrand{font-size:20px;font-weight:600;margin-bottom:3px}
.lsub{color:var(--muted);font-size:12px;margin-bottom:22px}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.lf label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.lf input{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);color:var(--text)}
.lf input:focus{outline:none;border-color:var(--blue)}
.lbtn{width:100%;padding:9px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);font-size:13px;font-weight:500;margin-top:4px}
.lbtn:hover{opacity:.88}
.lerr{color:var(--red);font-size:12px;margin-top:8px;padding:7px 10px;
  background:var(--red-bg);border-radius:var(--radius);display:none}
.demo-sec{margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.demo-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--hint);margin-bottom:7px}
.demo-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;margin-bottom:5px;transition:background .12s}
.demo-item:hover{background:var(--surface2)}
.ddot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dinfo{flex:1}
.dname{font-weight:500;font-size:12px}
.dcred{color:var(--hint);font-size:11px}
.dbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  position:fixed;top:0;left:0;right:0;z-index:100}
.tlogo{font-weight:600;font-size:14px;letter-spacing:.2px}
.tlogo span{color:var(--muted);font-weight:400}
.tright{display:flex;align-items:center;gap:10px}
.tbadge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:12px}
.tbadge-blue{background:var(--blue-bg);color:var(--blue)}
.tbadge-amber{background:var(--amber-bg);color:var(--amber)}
.tavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.tbtn{padding:5px 11px;border-radius:var(--radius);border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-size:11px;transition:background .12s}
.tbtn:hover{background:var(--surface2);color:var(--text)}

/* ── APP SHELL ── */
#pg-app{display:none;flex-direction:column}
.shell{display:flex;height:calc(100vh - var(--topbar-h));margin-top:var(--topbar-h)}

/* ── LEFT PANEL ── */
.lpanel{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lpanel-scroll{flex:1;overflow-y:auto;padding:14px 12px}
.lsec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
  color:var(--hint);margin-bottom:8px;margin-top:14px}
.lsec-title:first-child{margin-top:0}

/* ── DEPT NAV (boss sidebar) ── */
.dept-acc{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:6px}
.dept-acc-head{display:flex;align-items:center;gap:7px;padding:9px 10px;cursor:pointer;
  transition:background .12s;user-select:none}
.dept-acc-head:hover{background:var(--surface2)}
.dept-acc-head.open{background:var(--blue-bg)}
.dah-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dah-name{flex:1;font-weight:500;font-size:12.5px}
.dah-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-ok{background:#1D9E75}.st-pend{background:#EF9F27}
.dah-chevron{font-size:10px;color:var(--hint);transition:transform .2s;margin-left:2px}
.dah-chevron.open{transform:rotate(90deg)}
.dept-acc-body{display:none;border-top:1px solid var(--border);background:var(--surface2);padding:10px}
.dept-acc-body.open{display:block}
.kpi-snapshot{display:flex;flex-direction:column;gap:5px}
.ks-row{display:flex;align-items:baseline;justify-content:space-between;
  padding:4px 0;border-bottom:1px solid var(--border)}
.ks-row:last-child{border-bottom:none}
.ks-label{font-size:11px;color:var(--muted);flex:1}
.ks-val{font-size:13px;font-weight:500;margin-left:8px}
.ks-delta{font-size:10px;margin-left:5px}
.delta-up{color:var(--green)}.delta-dn{color:var(--red)}.delta-nu{color:var(--hint)}
.ks-comment{margin-top:8px;padding:6px 8px;background:var(--surface);border-radius:var(--radius);
  font-size:11px;color:var(--muted);font-style:italic;line-height:1.4;border:1px solid var(--border)}
.view-charts-btn{width:100%;margin-top:8px;padding:6px;border-radius:var(--radius);
  border:1px solid var(--blue-light);background:var(--blue-bg);color:var(--blue);
  font-size:11px;font-weight:500;cursor:pointer;transition:background .12s}
.view-charts-btn:hover{background:var(--blue-light)}

/* ── DATE RANGE PICKER ── */
.date-range{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;margin-bottom:12px}
.dr-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:8px}
.dr-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.dr-row label{font-size:11px;color:var(--muted);width:28px;flex-shrink:0}
.dr-sel{flex:1;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);color:var(--text);font-size:12px}
.dr-sel:focus{outline:none;border-color:var(--blue)}
.dr-apply{width:100%;padding:6px;border-radius:var(--radius);border:none;
  background:var(--blue);color:#fff;font-size:12px;font-weight:500;cursor:pointer;margin-top:4px}
.dr-apply:hover{opacity:.88}
.dr-quick{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.dr-qbtn{padding:3px 8px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:10px;cursor:pointer;transition:all .12s}
.dr-qbtn:hover,.dr-qbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── INPUT FORM (dept left panel) ── */
.inp-form-wrap{display:flex;flex-direction:column;gap:0}
.month-year-sel{display:flex;gap:6px;margin-bottom:12px}
.my-sel{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);color:var(--text);font-size:12px}
.my-sel:focus{outline:none;border-color:var(--blue)}
.inp-status{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding:6px 8px;border-radius:var(--radius);background:var(--surface2)}
.inp-status-lbl{font-size:11px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.kpi-inp-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ki-item{display:flex;flex-direction:column;gap:3px}
.ki-label{font-size:11px;color:var(--muted);font-weight:500}
.ki-input{padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);color:var(--text);transition:border-color .12s;width:100%}
.ki-input:focus{outline:none;border-color:var(--blue)}
.ki-comment{padding:6px 9px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);color:var(--text);resize:none;min-height:52px;width:100%;
  font-family:inherit;font-size:12px;line-height:1.4}
.ki-comment:focus{outline:none;border-color:var(--blue)}
.save-row{display:flex;flex-direction:column;gap:5px}
.save-btn{width:100%;padding:8px;border-radius:var(--radius);border:none;
  background:var(--blue);color:#fff;font-size:13px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px}
.save-btn:hover{opacity:.88}
.save-msg{font-size:11px;text-align:center;display:none}
.save-ok-msg{color:var(--green)}
.save-err-msg{color:var(--red)}
.ispin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RIGHT PANEL (charts) ── */
.rpanel{flex:1;overflow-y:auto;padding:16px 18px;background:var(--bg)}
.rp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.rp-title{font-size:16px;font-weight:600;line-height:1.2}
.rp-sub{font-size:12px;color:var(--muted);margin-top:3px}
.charts-stack{display:flex;flex-direction:column;gap:14px}
.chart-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px}
.cc-head{margin-bottom:12px}
.cc-title{font-size:13px;font-weight:600}
.cc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.cc-wrap{position:relative;height:180px}

/* ── BOSS ALL-DEPTS OVERVIEW ── */
.ov-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.ovs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;cursor:pointer;transition:border-color .15s}
.ovs-card:hover{border-color:var(--blue)}
.ovs-dept{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.ovs-dot{width:7px;height:7px;border-radius:50%}
.ovs-name{font-weight:500;font-size:12px}
.ovs-kpi{font-size:11px;color:var(--muted);margin-bottom:3px}
.ovs-val{font-size:18px;font-weight:600}
.ovs-status{font-size:10px;margin-top:4px;font-weight:500}

/* ── STATUS TABLE ── */
.stbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:14px}
.stbl-head{padding:12px 14px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody td{padding:9px 14px;font-size:12px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;color:var(--hint);gap:8px}
.empty-state-icon{font-size:32px;opacity:.4}
.empty-state-text{font-size:13px}

/* ── LOADING ── */
#global-loader{position:fixed;inset:0;background:rgba(245,244,240,.8);
  display:flex;align-items:center;justify-content:center;z-index:999}
.gloader-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
.gloader-spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite}
.gloader-lbl{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<!-- ══════════════════ GLOBAL LOADER ══════════════════ -->
<div id="global-loader" class="hidden">
  <div class="gloader-inner">
    <div class="gloader-spin"></div>
    <div class="gloader-lbl" id="loader-lbl">Loading…</div>
  </div>
</div>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="pg-login">
  <div class="lcard">
    <div class="lbrand">CMI Operations</div>
    <div class="lsub">KPI Reporting System</div>
    <div class="lf"><label>Username</label><input id="l-user" autocomplete="off" placeholder="e.g. production"></div>
    <div class="lf"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"></div>
    <div id="l-err" class="lerr"></div>
    <button class="lbtn" onclick="doLogin()">Sign in</button>
    <div class="demo-sec">
      <div class="demo-lbl">Demo accounts</div>
      <div id="demo-list"></div>
    </div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="pg-app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tlogo">CMI <span>· KPI Dashboard</span></div>
    <div class="tright">
      <span id="t-badge" class="tbadge"></span>
      <span id="t-name" style="font-size:12px;color:var(--muted)"></span>
      <div id="t-av" class="tavatar"></div>
      <button class="tbtn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="shell">

    <!-- ════════════ LEFT PANEL ════════════ -->
    <div class="lpanel" id="lpanel">
      <div class="lpanel-scroll" id="lpanel-content">
        <!-- injected by JS -->
      </div>
    </div>

    <!-- ════════════ RIGHT PANEL ════════════ -->
    <div class="rpanel" id="rpanel">
      <div class="rp-header">
        <div>
          <div class="rp-title" id="rp-title">Select a department</div>
          <div class="rp-sub" id="rp-sub"></div>
        </div>
      </div>
      <div id="rp-body">
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Select a department from the left panel</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — fill in after IT setup
// ══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4RBwya-zrnWPd-0I58UF-wwHaxa-RxNoFWG_P-I2Fix8snKkT1Ug2N93IP8dHs14Y/exec'; // or SharePoint config

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const NOW_Y  = new Date().getFullYear();
const NOW_M  = new Date().getMonth();
const YEARS  = [NOW_Y-1, NOW_Y, NOW_Y+1];

const DEPTS = [
  {id:'PROD',  name:'Production',    manager:'Mr.Production',       color:'#378ADD',
   purpose:'Deliver boats to plan, on time, with controlled labour.',
   kpis:[
     {key:'boats_started',   label:'Boats Started',        unit:'count', t:'int'},
     {key:'boats_completed', label:'Boats Completed',       unit:'count', t:'int'},
     {key:'schedule_adh',    label:'Schedule Adherence',    unit:'%',     t:'pct'},
     {key:'labour_plan',     label:'Labour vs Plan',        unit:'%',     t:'pct'},
     {key:'rework_pct',      label:'Rework Hours',          unit:'% hrs', t:'pct'},
   ]},
  {id:'SALES', name:'Sales',         manager:'Mr.Sale',   color:'#1D9E75',
   purpose:'Order intake quality and predictability.',
   kpis:[
     {key:'orders_usd',      label:'Orders Booked',         unit:'USD',   t:'cur'},
     {key:'units_sold',      label:'Units Sold',            unit:'count', t:'int'},
     {key:'pipeline_usd',    label:'Sales Pipeline',        unit:'USD',   t:'cur'},
     {key:'order_changes',   label:'Order Changes',         unit:'count', t:'int'},
   ]},
  {id:'QA',    name:'Quality Assurance', manager:'Mr.QA',        color:'#D4537E',
   purpose:'Gatekeeper of first-time quality.',
   kpis:[
     {key:'ftp_pct',         label:'First Time Pass',       unit:'%',     t:'pct'},
     {key:'defects_a',       label:'Defects A',             unit:'count', t:'int'},
     {key:'defects_b',       label:'Defects B',             unit:'count', t:'int'},
     {key:'defects_c',       label:'Defects C',             unit:'count', t:'int'},
     {key:'rework_loops',    label:'Rework Loopbacks',      unit:'count', t:'int'},
   ]},
  {id:'FIN',   name:'Finance',        manager:'Mr.CFO',    color:'#EF9F27',
   purpose:'Cash, margin, and discipline.',
   kpis:[
     {key:'cashflow',        label:'Operating Cash Flow',   unit:'USD',   t:'cur'},
     {key:'gross_margin',    label:'Gross Margin',          unit:'%',     t:'pct'},
     {key:'ar_60',           label:'AR >60 days',           unit:'USD',   t:'cur'},
     {key:'inventory_val',   label:'Inventory Value',       unit:'USD',   t:'cur'},
   ]},
  {id:'SCM',   name:'Supply Chain',   manager:'Mr.SCM',     color:'#D85A30',
   purpose:'Material availability without excess cash burn.',
   kpis:[
     {key:'otif_pct',        label:'OTIF to Production',    unit:'%',     t:'pct'},
     {key:'shortages',       label:'Material Shortages',    unit:'count', t:'int'},
     {key:'inv_turns',       label:'Inventory Turns',       unit:'x',     t:'dec'},
     {key:'freight_usd',     label:'Expedited Freight',     unit:'USD',   t:'cur'},
   ]},
  {id:'HR',    name:'Human Resources',manager:'Ms.HR',            color:'#7F77DD',
   purpose:'Stability and capability.',
   kpis:[
     {key:'headcount',       label:'Headcount (actual)',    unit:'count', t:'int'},
     {key:'headcount_plan',  label:'Headcount (plan)',      unit:'count', t:'int'},
     {key:'turnover_pct',    label:'Staff Turnover',        unit:'%',     t:'pct'},
     {key:'absence_pct',     label:'Absenteeism',           unit:'%',     t:'pct'},
   ]},
  {id:'HSE',   name:'HSE',            manager:'Mr.HSE',           color:'#639922',
   purpose:'Prevent incidents and ensure compliance.',
   kpis:[
     {key:'trir',            label:'TRIR',                  unit:'rate',  t:'dec'},
     {key:'ltifr',           label:'LTIFR',                 unit:'rate',  t:'dec'},
     {key:'near_miss',       label:'Near Miss Reports',     unit:'count', t:'int'},
     {key:'compliance_pct',  label:'Safety Compliance',     unit:'%',     t:'pct'},
   ]},
];

const DEMO = {
  boss:       {role:'boss',  name:'Managing Director',   initials:'MD', color:'#EF9F27', pass:'boss123'},
  production: {role:'dept',  dept:'PROD', name:'Mr.Production',   initials:'RK', color:'#378ADD', pass:'prod123'},
  sales:      {role:'dept',  dept:'SALES',name:'Mr.Sale',            initials:'MS', color:'#1D9E75', pass:'sales123'},
  qa:         {role:'dept',  dept:'QA',   name:'Mr.QA',         initials:'DA', color:'#D4537E', pass:'qa123'},
  finance:    {role:'dept',  dept:'FIN',  name:'Mr.CFO', initials:'PD', color:'#EF9F27', pass:'fin123'},
  supply:     {role:'dept',  dept:'SCM',  name:'Mr.SCM',  initials:'LT', color:'#D85A30', pass:'scm123'},
  hr:         {role:'dept',  dept:'HR',   name:'Ms.HR',         initials:'MC', color:'#7F77DD', pass:'hr123'},
  hse:        {role:'dept',  dept:'HSE',  name:'Mr.HSE',        initials:'MP', color:'#639922', pass:'hse123'},
};

// ══════════════════════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════════════════════
// Key format: "DEPTID_YEAR_MONTHIDX"
let STORE = {};
let charts = {};

function storeKey(dept, year, month){ return `${dept}_${year}_${month}`; }

function seedDemo() {
  DEPTS.forEach(d => {
    // Seed 2 years of data
    [NOW_Y-1, NOW_Y].forEach(yr => {
      const maxM = yr === NOW_Y ? NOW_M : 11;
      for(let m=0; m<=maxM; m++){
        let r = {_saved:true, _ts:`${MONTHS[m]} ${yr}`, comment:''};
        d.kpis.forEach(k => {
          if(k.t==='pct')  r[k.key] = +(75+Math.random()*20).toFixed(1);
          else if(k.t==='int')  r[k.key] = Math.round(5+Math.random()*20);
          else if(k.t==='cur')  r[k.key] = Math.round((150000+Math.random()*850000)/1000)*1000;
          else              r[k.key] = +(1+Math.random()*5).toFixed(2);
        });
        if(d.id==='QA')   { r.ftp_pct = +(84+Math.random()*13).toFixed(1); }
        if(d.id==='PROD') { r.boats_started=Math.round(8+Math.random()*6); r.boats_completed=r.boats_started-Math.round(Math.random()*2); }
        STORE[storeKey(d.id,yr,m)] = r;
      }
    });
    STORE[storeKey(d.id,NOW_Y,NOW_M)] = {_saved:false};
  });
}

function buildDemoList(){
  document.getElementById('demo-list').innerHTML = Object.entries(DEMO).map(([u,a])=>`
    <div class="demo-item" onclick="quickLogin('${u}')">
      <span class="ddot" style="background:${a.color}"></span>
      <div class="dinfo"><div class="dname">${a.name}</div><div class="dcred">${u} / ${a.pass}</div></div>
      <span class="dbadge" style="background:${a.role==='boss'?'var(--amber-bg)':'var(--blue-bg)'};color:${a.role==='boss'?'var(--amber)':'var(--blue)'}">${a.role==='boss'?'All depts':a.dept}</span>
    </div>`).join('');
}

function quickLogin(u){ document.getElementById('l-user').value=u; document.getElementById('l-pass').value=DEMO[u].pass; doLogin(); }

function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const acc=DEMO[u];
  if(!acc||acc.pass!==p){ document.getElementById('l-err').textContent='Incorrect credentials.'; document.getElementById('l-err').style.display='block'; return; }
  document.getElementById('l-err').style.display='none';
  user={...acc, username:u};
  startApp();
}
document.addEventListener('DOMContentLoaded',()=>{
  buildDemoList();
  document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('l-user').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

function doLogout(){
  user=null; selDept=null; bossOpenDept=null;
  Object.keys(charts).forEach(k=>{try{charts[k].destroy();}catch(e){}});
  charts={};
  document.getElementById('pg-app').style.display='none';
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
}

async function startApp() {
  // 1. Hiện màn hình loading
  const loader = document.getElementById('global-loader');
  if (loader) loader.classList.remove('hidden');

  try {
    // 2. Gọi dữ liệu từ Google Sheets
    const resp = await fetch(`${SCRIPT_URL}?action=getAll`, {
      method: 'GET',
      mode: 'cors',      
      redirect: 'follow' 
    });

    if (!resp.ok) throw new Error('Phản hồi từ server không ổn định');

    const data = await resp.json();

    // 3. Nạp dữ liệu vào STORE & Xử lý định dạng thời gian
    if (data && data.rows) {
      STORE = {}; // Làm sạch dữ liệu cũ
      data.rows.forEach(row => {
        // --- XỬ LÝ TIMEZONE VIỆT NAM TRỰC TIẾP TẠI ĐÂY ---
        if (row.submitted_at) {
          try {
            const date = new Date(row.submitted_at);
            // Ghi đè trực tiếp vào trường submitted_at
            row.submitted_at = date.toLocaleString('vi-VN', {
              timeZone: 'Asia/Ho_Chi_Minh',
              hour: '2-digit',
              minute: '2-digit',
              day: '2-digit',
              month: '2-digit',
              year: 'numeric',
              hour12: false
            });
          } catch (e) {
            console.error("Lỗi định dạng ngày cho dòng:", row, e);
          }
        }

        const mIdx = parseInt(row.month) - 1;
        const key = storeKey(row.dept, row.year, mIdx);
        
        // Gán _ts bằng dữ liệu đã format để hàm renderBossRight() hiển thị đúng
        STORE[key] = { 
          ...row, 
          _saved: true, 
          _ts: row.submitted_at || '—' 
        }; 
      });
    }
  } catch (e) {
    console.error("Lỗi kết nối hệ thống:", e);
  }

  // 4. Chuyển đổi giao diện (Ẩn loading, hiện App)
  if (loader) loader.classList.add('hidden');
  const pgLogin = document.getElementById('pg-login');
  const pgApp = document.getElementById('pg-app');
  
  if (pgLogin) pgLogin.style.display = 'none';
  if (pgApp) pgApp.style.display = 'flex';
  
  // 5. Cập nhật thông tin người dùng (Avatar & Name)
  const av = document.getElementById('u-av');
  const uName = document.getElementById('u-name');
  const tBadge = document.getElementById('t-badge');

  if (av && user) {
    av.textContent = user.initials || '';
    av.style.background = (user.color || '#ccc') + '25';
    av.style.color = user.color || '#333';
  }

  if (uName && user) {
    uName.textContent = user.name || 'User';
  }

  // 6. Phân quyền hiển thị Boss hoặc Staff
  if (user && user.role === 'boss') {
    if (tBadge) {
      tBadge.textContent = 'Management';
      tBadge.className = 'tbadge tbadge-amber';
    }
    // Gọi giao diện cho quản lý
    if (typeof buildBossLeft === 'function') buildBossLeft();
    if (typeof renderBossRight === 'function') renderBossRight();
    
  } else if (user) {
    if (tBadge) {
      tBadge.textContent = user.dept;
      tBadge.className = 'tbadge tbadge-blue';
    }
    // Thiết lập các biến chọn mặc định cho nhân viên
    selDept = user.dept; 
    selYear = NOW_Y; 
    selMonth = NOW_M;
    
    // Gọi giao diện cho nhân viên
    if (typeof buildDeptLeft === 'function') buildDeptLeft();
    if (typeof renderDeptRight === 'function') renderDeptRight();
  }
}

async function saveDept() {
  const dept = DEPTS.find(d => d.id === selDept);
  const spin = document.getElementById('save-spin');
  const lbl = document.getElementById('save-lbl');
  const ok = document.getElementById('save-ok');
  const err = document.getElementById('save-err');

  // Hiệu ứng loading
  spin.style.display = 'inline-block';
  lbl.textContent = 'Saving to Sheets...';
  ok.style.display = 'none';
  err.style.display = 'none';

  // Thu thập dữ liệu từ các ô Input
  const payload = {
    action: 'saveKPI',
    dept: selDept,
    month: selMonth + 1, // Apps Script thường dùng 1-12
    year: selYear,
    user: user.username,
    comment: document.getElementById('ki-comment').value,
    kpis: {}
  };

  dept.kpis.forEach(k => {
    const v = document.getElementById('ki-' + k.key).value;
    payload.kpis[k.key] = v !== '' ? parseFloat(v) : null;
  });

  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    const result = await resp.json();

    if (result.success) {
      // CẬP NHẬT LOCAL STORE NGAY LẬP TỨC
      const key = storeKey(selDept, selYear, selMonth);
      STORE[key] = {
        ...payload.kpis,
        comment: payload.comment,
        month: payload.month,
        year: payload.year,
        dept: payload.dept,
        _saved: true
      };

      // Hiển thị thông báo thành công
      spin.style.display = 'none';
      lbl.textContent = 'Save KPIs';
      ok.style.display = 'block';
      document.getElementById('inp-badge').textContent = 'Submitted';
      document.getElementById('inp-badge').className = 'badge badge-green';

      // QUAN TRỌNG: Vẽ lại biểu đồ với dữ liệu mới
      renderDeptRight(); 
      
      setTimeout(() => { ok.style.display = 'none'; }, 3000);
    } else {
      throw new Error(result.error || 'Server rejected');
    }
  } catch (e) {
    console.error("Save error:", e);
    spin.style.display = 'none';
    lbl.textContent = 'Save KPIs';
    err.textContent = 'Lỗi: ' + e.message;
    err.style.display = 'block';
  }
}

function renderDeptRight(){
  const dept=DEPTS.find(d=>d.id===selDept);
  document.getElementById('rp-title').textContent=dept.name;
  document.getElementById('rp-sub').textContent=dept.purpose;

  const {labels,keys}=buildDateRange();
  const body=document.getElementById('rp-body');

  // Destroy old charts
  Object.keys(charts).filter(k=>k.startsWith('d_')).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});

  body.innerHTML='<div class="charts-stack" id="charts-stack"></div>';
  const stack=document.getElementById('charts-stack');

  dept.kpis.forEach((kpi,idx)=>{
    const deptKeys=keys.map(k=>k.replace('DEPTID',selDept));
    const vals=deptKeys.map(k=>STORE[k]?.[kpi.key]??null);
    const canvasId=`d_${idx}`;
    const card=document.createElement('div');
    card.className='chart-card';
    card.innerHTML=`
      <div class="cc-head">
        <div class="cc-title">${kpi.label}</div>
        <div class="cc-sub">${kpi.unit} · ${labels[0]} → ${labels[labels.length-1]}</div>
      </div>
      <div class="cc-wrap"><canvas id="${canvasId}"></canvas></div>`;
    stack.appendChild(card);
    charts[canvasId]=mkLine(canvasId,labels,kpi.label,vals,dept.color,kpi.unit);
  });
}

  let html=`
    <div class="lsec-title">Chart range</div>

function buildAccBody(dept, row){
  const prevRow=STORE[storeKey(dept.id,NOW_Y,NOW_M>0?NOW_M-1:0)]||{};
  const kpiRows=dept.kpis.map(k=>{
    const val=row[k.key]; const prev=prevRow[k.key];
    let delta='', dcls='delta-nu';
    if(val!=null&&prev!=null&&prev!==0){
      const p=((val-prev)/Math.abs(prev)*100).toFixed(1);
      delta=`${p>=0?'▲':'▼'}${Math.abs(p)}%`;
      dcls=p>=0?'delta-up':'delta-dn';
    }
    return `<div class="ks-row">
      <span class="ks-label">${k.label}</span>
      <span class="ks-val" style="color:${dept.color}">${val!=null?fmtV(val,k):'—'}</span>
      ${delta?`<span class="ks-delta ${dcls}">${delta}</span>`:''}
    </div>`;
  }).join('');

  const cmt=row.comment||'';
  const cmtHtml=cmt?`<div class="ks-comment">${cmt}</div>`:'';

  return `<div class="kpi-snapshot">${kpiRows}</div>
    ${cmtHtml}
    <button class="view-charts-btn" onclick="bossSelectDept('${dept.id}')">View all charts →</button>`;
}

function toggleAcc(deptId){
  const wasOpen = bossOpenDept===deptId;
  bossOpenDept = wasOpen ? null : deptId;
  // Update accordion UI only (don't re-render right panel unless clicking view)
  DEPTS.forEach(d=>{
    const head=document.querySelector(`#acc-${d.id} .dept-acc-head`);
    const body=document.getElementById(`body-${d.id}`);
    const chev=document.querySelector(`#acc-${d.id} .dah-chevron`);
    const open=bossOpenDept===d.id;
    head.classList.toggle('open',open);
    body.classList.toggle('open',open);
    chev.classList.toggle('open',open);
  });
}

function setBossQuick(preset){
  document.querySelectorAll('.dr-qbtn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(preset==='ytd')    { drFrom={y:NOW_Y,m:0};     drTo={y:NOW_Y,m:NOW_M}; }
  if(preset==='last12') { drFrom={y:NOW_Y-1,m:(NOW_M+1)%12}; drTo={y:NOW_Y,m:NOW_M}; }
  if(preset==='all')    { drFrom={y:NOW_Y-1,m:0};   drTo={y:NOW_Y,m:NOW_M}; }
  buildBossLeft();
  if(bossOpenDept) renderBossRight(bossOpenDept);
  else renderBossRight();
}

function applyBossRange(){
  drFrom.m=parseInt(document.getElementById('bdr-fm').value);
  drFrom.y=parseInt(document.getElementById('bdr-fy').value);
  drTo.m=parseInt(document.getElementById('bdr-tm').value);
  drTo.y=parseInt(document.getElementById('bdr-ty').value);
  buildBossLeft();
  if(bossOpenDept) renderBossRight(bossOpenDept);
  else renderBossRight();
}

function bossSelectDept(deptId){
  bossOpenDept=deptId;
  renderBossRight(deptId);
}

// ══════════════════════════════════════════════════════
// BOSS VIEW — RIGHT PANEL
// ══════════════════════════════════════════════════════
function renderBossRight(deptId) {
  // 1. Dọn dẹp bộ nhớ (Xóa biểu đồ cũ)
  const { labels, keys } = buildDateRange();
  Object.keys(charts).filter(k => k.startsWith('b_')).forEach(k => {
    try { charts[k].destroy(); } catch (e) {}
    delete charts[k];
  });

  const titleEl = document.getElementById('rp-title');
  const subEl = document.getElementById('rp-sub');
  const bodyEl = document.getElementById('rp-body');

  if (!deptId) {
    // --- QUAN TRỌNG: Hiện lại thanh menu bên trái khi về Overview ---
    if (typeof buildBossLeft === 'function') buildBossLeft();

    // Show overview: all depts comparison chart
    titleEl.textContent = 'All Departments';
    subEl.textContent = `Submission status · ${MONTHS[NOW_M]} ${NOW_Y}`;

    const submitted = DEPTS.filter(d => STORE[storeKey(d.id, NOW_Y, NOW_M)]?._saved).length;
    
    bodyEl.innerHTML = `
      <div class="stbl-wrap">
        <div class="stbl-head">
          <span>Submission status — ${MONTHS[NOW_M]} ${NOW_Y}</span>
          <span style="font-size:11px;font-weight:400;color:var(--muted)">${submitted}/${DEPTS.length} submitted</span>
        </div>
        <table>
          <thead><tr><th>Department</th><th>Manager</th><th>Status</th><th>Last saved</th><th></th></tr></thead>
          <tbody>${DEPTS.map(d => {
            const r = STORE[storeKey(d.id, NOW_Y, NOW_M)] || {};
            const sub = r._saved;
            return `<tr>
              <td><span style="display:inline-flex;align-items:center;gap:6px">
                <span style="width:7px;height:7px;border-radius:50%;background:${d.color};display:inline-block"></span>${d.name}
              </span></td>
              <td style="color:var(--muted)">${d.manager}</td>
              <td><span class="badge ${sub ? 'badge-green' : 'badge-amber'}">${sub ? 'Submitted' : 'Pending'}</span></td>
              <td style="color:var(--muted);font-size:11px">${r.submitted_at || '—'}</td>
              <td><button class="view-charts-btn" style="width:auto;padding:4px 10px" onclick="bossSelectDept('${d.id}')">Charts →</button></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>

      <div class="charts-stack">
        ${DEPTS.map((d, di) => `
          <div class="chart-card">
            <div class="cc-head">
              <div class="cc-title" style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:${d.color};display:inline-block"></span>
                ${d.name} — ${d.kpis[0].label}
              </div>
              <div class="cc-sub">${d.kpis[0].unit} · ${labels[0]} → ${labels[labels.length - 1]}</div>
            </div>
            <div class="cc-wrap"><canvas id="b_ov_${di}"></canvas></div>
          </div>`).join('')}
      </div>`;

    // render mỗi dept's first KPI
    DEPTS.forEach((d, di) => {
      const deptKeys = keys.map(k => k.replace('DEPTID', d.id));
      const vals = deptKeys.map(k => STORE[k]?.[d.kpis[0].key] ?? null);
      charts[`b_ov_${di}`] = mkLine(`b_ov_${di}`, labels, d.kpis[0].label, vals, d.color, d.kpis[0].unit);
    });
    return;
  }

  // Single dept — all KPI charts
  const dept = DEPTS.find(d => d.id === deptId);

  // --- THÊM NÚT BACK VÀO TIÊU ĐỀ ---
  titleEl.innerHTML = `
    <div style="display:flex; align-items:center; gap:12px">
      <button class="tbtn" onclick="renderBossRight()" style="padding:4px 10px; font-size:12px; cursor:pointer">← Back</button>
      <span>${dept.name}</span>
    </div>
  `;
  subEl.textContent = dept.purpose;

  bodyEl.innerHTML = '<div class="charts-stack" id="b-charts-stack"></div>';
  const stack = document.getElementById('b-charts-stack');

  dept.kpis.forEach((kpi, idx) => {
    const deptKeys = keys.map(k => k.replace('DEPTID', deptId));
    const vals = deptKeys.map(k => STORE[k]?.[kpi.key] ?? null);
    const canvasId = `b_${idx}`;
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="cc-head">
        <div class="cc-title">${kpi.label}</div>
        <div class="cc-sub">${kpi.unit} · ${labels[0]} → ${labels[labels.length - 1]}</div>
      </div>
      <div class="cc-wrap"><canvas id="${canvasId}"></canvas></div>`;
    stack.appendChild(card);
    charts[canvasId] = mkLine(canvasId, labels, kpi.label, vals, dept.color, kpi.unit);
  });
}

// ══════════════════════════════════════════════════════
// DATE RANGE BUILDER
// ══════════════════════════════════════════════════════
function buildDateRange(){
  const labels=[], keys=[];
  let cy=drFrom.y, cm=drFrom.m;
  while(cy<drTo.y||(cy===drTo.y&&cm<=drTo.m)){
    labels.push(`${MONTHS[cm]} ${cy}`);
    keys.push(`DEPTID_${cy}_${cm}`);
    cm++; if(cm>11){cm=0;cy++;}
    if(labels.length>48) break; // safety cap
  }
  return {labels, keys};
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fmtV(v,k){
  if(v==null) return '—';
  if(k.t==='cur') return '$'+Number(v).toLocaleString();
  if(k.t==='pct') return Number(v).toFixed(1)+'%';
  if(k.t==='dec') return Number(v).toFixed(2);
  return Math.round(v).toString();
}

function mkLine(canvasId, labels, label, data, color, unit){
  const hasData = data.some(v=>v!=null&&v!==0);
  return new Chart(document.getElementById(canvasId),{
    type:'line',
    data:{labels, datasets:[{
      label, data,
      borderColor: color,
      backgroundColor: color+'15',
      tension:.3, fill:true,
      pointRadius: labels.length>24 ? 2 : 4,
      pointBackgroundColor: color,
      spanGaps: true,
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{
        callbacks:{label: ctx=>{
          const v=ctx.raw;
          if(v==null) return 'No data';
          if(unit==='%') return v.toFixed(1)+'%';
          if(unit==='USD') return '$'+Number(v).toLocaleString();
          return v;
        }}
      }},
      scales:{
        y:{beginAtZero: unit!=='%',
           grid:{color:'rgba(0,0,0,.05)'},
           ticks:{font:{size:10}, callback:v=>{
             if(unit==='%') return v+'%';
             if(unit==='USD') return '$'+(v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'k':v);
             return v;
           }}},
        x:{grid:{display:false}, ticks:{font:{size:10},
           maxRotation:45, autoSkip:true, maxTicksLimit:labels.length>18?10:labels.length}}
      }
    }
  });
}
</script>
